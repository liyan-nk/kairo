spring:
  application:
    name: kairo-backend-test

  datasource:
    url: jdbc:h2:mem:kairo_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

kairo:
  security:
    jwt:
      secret: testSecretKeyForKairoJwtTokenAuthenticationMustBeLongEnough64BytesLongHere!
      expiration-ms: 900000
      refresh-expiration-ms: 604800000
    cors:
      allowed-origins: http://localhost:5173
