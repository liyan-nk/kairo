spring:
  application:
    name: kairo-backend-test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

kairo:
  security:
    jwt:
      secret: testSecretKeyForKairoJwtTokenAuthenticationMustBeLongEnough64BytesLongHere!
      expiration-ms: 900000
      refresh-expiration-ms: 604800000
    cors:
      allowed-origins: http://localhost:5173
