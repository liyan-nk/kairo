server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: kairo-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kairo_db}
    username: ${SPRING_DATASOURCE_USERNAME:kairo_user}
    password: ${SPRING_DATASOURCE_PASSWORD:kairo_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

kairo:
  security:
    jwt:
      secret: ${KAIRO_JWT_SECRET:9a7f8b2c4e6d8a1f3b5c7d9e0f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a}
      expiration-ms: ${KAIRO_JWT_EXPIRATION_MS:900000} # 15 minutes
      refresh-expiration-ms: ${KAIRO_REFRESH_EXPIRATION_MS:604800000} # 7 days
    cors:
      allowed-origins: ${KAIRO_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
